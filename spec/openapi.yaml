openapi: 3.1.0
info:
  title: Servicialo HTTP API
  description: |
    Canonical HTTP binding for the Servicialo protocol v0.8.
    Maps MCP tools to REST endpoints with exact semantic parity.
    See HTTP_PROFILE.md for the full specification.
  version: 1.0.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    name: Servicialo
    url: https://servicialo.com

servers:
  - url: https://api.example.com/servicialo/v1
    description: Example server (replace with actual implementation URL)

tags:
  - name: Discovery
    description: "Phase 1 — Public endpoints. No authentication required."
  - name: Understanding
    description: "Phase 2 — Service and contract details."
  - name: Commitment
    description: "Phase 3 — Client resolution, booking, and confirmation."
  - name: Lifecycle
    description: "Phase 4 — State transitions, rescheduling, cancellation."
  - name: Delivery
    description: "Phase 5 — Check-in, check-out, evidence."
  - name: Closing
    description: "Phase 6 — Documentation, sales, payments."
  - name: Service Orders
    description: "Bilateral commercial agreements."
  - name: Mandates
    description: "AI agent delegation management."
  - name: Resources
    description: "Physical resource management (rooms, boxes, equipment)."
  - name: A2A Extension
    description: |
      Agent-to-Agent (A2A) interoperability endpoints.
      Optional for basic Servicialo implementations.
      Required for "Servicialo A2A Ready" certification.
      See: https://a2a-protocol.org/

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  /:
    get:
      operationId: getCapabilities
      summary: Server capabilities
      description: Returns protocol version and supported tools.
      tags: [Discovery]
      security: []
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      responses:
        "200":
          description: Server capabilities.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/CapabilitiesResponse"
              example:
                data:
                  type: server
                  id: servicialo
                  attributes:
                    protocol_version: "0.8"
                    profile_version: "1.0.0"
                    compliance: extended
                    capabilities:
                      - registry.search
                      - service.get
                      - scheduling.book
                      - lifecycle.transition
                      - delivery.record_evidence
                      - payments.create_sale
        "406":
          description: Unsupported protocol version.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                errors:
                  - status: "406"
                    code: UNSUPPORTED_VERSION
                    title: Unsupported protocol version
                    detail: "X-Servicialo-Version '0.5' is not supported."

  # ────────────────────────────────────────────
  # Phase 1 — Discovery (Public)
  # ────────────────────────────────────────────

  /registry/organizations:
    get:
      operationId: registrySearch
      x-mcp-tool: registry.search
      summary: Search organizations by vertical and location
      tags: [Discovery]
      security: []
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: vertical
          in: query
          required: true
          schema:
            type: string
          example: kinesiologia
        - name: location
          in: query
          schema:
            type: string
          example: Santiago
        - name: country
          in: query
          schema:
            type: string
            default: cl
          example: cl
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
          example: 10
      responses:
        "200":
          description: Matching organizations.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/OrganizationCollection"
              example:
                data:
                  - type: organizations
                    id: clinica-dental-sur
                    attributes:
                      name: "Clínica Dental Sur"
                      vertical: dental
                      location: Santiago
                      country: cl
                meta:
                  total: 1
                  page: 1
                  per_page: 10
        "422":
          $ref: "#/components/responses/ValidationError"

  /registry/organizations/{org_slug}:
    get:
      operationId: registryGetOrganization
      x-mcp-tool: registry.get_organization
      summary: Get public organization details
      tags: [Discovery]
      security: []
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: org_slug
          in: path
          required: true
          schema:
            type: string
          example: clinica-dental-sur
        - name: country
          in: query
          schema:
            type: string
            default: cl
      responses:
        "200":
          description: Organization with services, professionals, and booking config.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/OrganizationResource"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{org_slug}/services:
    get:
      operationId: servicesList
      x-mcp-tool: services.list
      summary: List public service catalog
      tags: [Discovery]
      security: []
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: org_slug
          in: path
          required: true
          schema:
            type: string
          example: clinica-dental-sur
      responses:
        "200":
          description: Collection of public services.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceCollection"
        "404":
          $ref: "#/components/responses/NotFound"

  /availability:
    get:
      operationId: schedulingCheckAvailability
      x-mcp-tool: scheduling.check_availability
      summary: Check available time slots (public)
      tags: [Discovery]
      security: []
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: org_slug
          in: query
          required: true
          schema:
            type: string
          example: clinica-dental-sur
        - name: date_from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-16"
        - name: date_to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-22"
        - name: service_id
          in: query
          schema:
            type: string
        - name: provider_id
          in: query
          schema:
            type: string
        - name: resource_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Available time slots.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/AvailabilityCollection"
              example:
                data:
                  - type: availability_slots
                    id: slot_001
                    attributes:
                      provider_id: prov_abc
                      starts_at: "2026-03-16T09:00:00-03:00"
                      ends_at: "2026-03-16T09:45:00-03:00"
                      resource_id: res_box3
        "422":
          $ref: "#/components/responses/ValidationError"

  # ────────────────────────────────────────────
  # Phase 2 — Understanding
  # ────────────────────────────────────────────

  /services/{service_id}:
    get:
      operationId: serviceGet
      x-mcp-tool: service.get
      summary: Get full 8-dimension service definition
      tags: [Understanding]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: service_id
          in: path
          required: true
          schema:
            type: string
          example: svc_kinesiologia_45
      responses:
        "200":
          description: Service object.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceResource"
              example:
                data:
                  type: services
                  id: svc_kinesiologia_45
                  attributes:
                    type: physical_therapy_session
                    vertical: health
                    name: "Sesión de rehabilitación — 45 min"
                    duration_minutes: 45
                    provider:
                      id: prov_abc
                      organization_id: org_xyz
                    client:
                      id: cli_001
                    schedule:
                      requested_at: "2026-03-15T08:00:00Z"
                    location:
                      type: in_person
                      room: "Box 3"
                    lifecycle:
                      current_state: requested
                    proof: {}
                    billing:
                      amount:
                        value: 35000
                        currency: CLP
        "404":
          $ref: "#/components/responses/NotFound"
        "403":
          $ref: "#/components/responses/Forbidden"

  /services/{service_id}/contract:
    get:
      operationId: contractGet
      x-mcp-tool: contract.get
      summary: Get service contract (policies, evidence requirements)
      tags: [Understanding]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: service_id
          in: path
          required: true
          schema:
            type: string
        - name: org_id
          in: query
          required: true
          schema:
            type: string
          example: org_xyz
      responses:
        "200":
          description: Contract with cancellation, no-show, arbitration policies.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ContractResource"
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────
  # Phase 3 — Commitment
  # ────────────────────────────────────────────

  /clients:
    post:
      operationId: clientsGetOrCreate
      x-mcp-tool: clients.get_or_create
      summary: Find or create a client (upsert)
      tags: [Commitment]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ClientUpsertRequest"
            example:
              data:
                type: clients
                attributes:
                  email: maria@example.com
                  phone: "+56912345678"
                  name: María
                  last_name: González
                  actor:
                    type: agent
                    id: agent_01
                    mandate_id: mdt_abc
      responses:
        "200":
          description: Existing client found.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ClientResource"
        "201":
          description: New client created.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ClientResource"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sessions:
    post:
      operationId: schedulingBook
      x-mcp-tool: scheduling.book
      summary: Book a new session
      tags: [Commitment]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/SessionBookRequest"
            example:
              data:
                type: sessions
                attributes:
                  service_id: svc_001
                  provider_id: prov_abc
                  client_id: cli_001
                  starts_at: "2026-03-16T09:00:00-03:00"
                  resource_id: res_box3
                  actor:
                    type: agent
                    id: agent_01
                    mandate_id: mdt_abc
      responses:
        "201":
          description: Session created in `requested` state.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
              example:
                data:
                  type: sessions
                  id: ses_abc123
                  attributes:
                    service_id: svc_001
                    provider_id: prov_abc
                    client_id: cli_001
                    starts_at: "2026-03-16T09:00:00-03:00"
                    resource_id: res_box3
                    lifecycle:
                      current_state: requested
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /sessions/{session_id}/confirm:
    post:
      operationId: schedulingConfirm
      x-mcp-tool: scheduling.confirm
      summary: Confirm a booked session
      tags: [Commitment]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ActorRequest"
            example:
              data:
                type: confirmations
                attributes:
                  actor:
                    type: client
                    id: cli_001
      responses:
        "200":
          description: Session confirmed.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  # ────────────────────────────────────────────
  # Phase 4 — Lifecycle
  # ────────────────────────────────────────────

  /sessions/{session_id}/lifecycle:
    get:
      operationId: lifecycleGetState
      x-mcp-tool: lifecycle.get_state
      summary: Get lifecycle state and transition history
      tags: [Lifecycle]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Lifecycle state with available transitions and history.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/LifecycleResource"
              example:
                data:
                  type: lifecycle_states
                  id: ses_abc123
                  attributes:
                    current_state: confirmed
                    available_transitions:
                      - in_progress
                      - cancelled
                    transitions:
                      - from: null
                        to: requested
                        at: "2026-03-15T08:00:00Z"
                        by: agent_01
                        method: agent
                      - from: requested
                        to: confirmed
                        at: "2026-03-15T08:05:00Z"
                        by: cli_001
                        method: manual
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/{session_id}/transitions:
    post:
      operationId: lifecycleTransition
      x-mcp-tool: lifecycle.transition
      summary: Execute a state transition
      tags: [Lifecycle]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/TransitionRequest"
            example:
              data:
                type: transitions
                attributes:
                  to_state: in_progress
                  actor:
                    type: provider
                    id: prov_abc
      responses:
        "200":
          description: Session transitioned.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
              example:
                data:
                  type: sessions
                  id: ses_abc123
                  attributes:
                    lifecycle:
                      current_state: in_progress
                meta:
                  transition:
                    from: confirmed
                    to: in_progress
                    at: "2026-03-16T09:02:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /sessions/{session_id}/reschedule:
    post:
      operationId: schedulingReschedule
      x-mcp-tool: scheduling.reschedule
      summary: Reschedule a session
      tags: [Lifecycle]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/RescheduleRequest"
            example:
              data:
                type: reschedules
                attributes:
                  new_datetime: "2026-03-17T10:00:00-03:00"
                  actor:
                    type: client
                    id: cli_001
      responses:
        "200":
          description: Session rescheduled (state returns to `scheduled`).
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /sessions/{session_id}/cancel:
    post:
      operationId: schedulingCancel
      x-mcp-tool: scheduling.cancel
      summary: Cancel a session
      tags: [Lifecycle]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
            example:
              data:
                type: cancellations
                attributes:
                  reason: "Client requested cancellation."
                  actor:
                    type: client
                    id: cli_001
      responses:
        "200":
          description: Session cancelled with policy applied.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  # ────────────────────────────────────────────
  # Phase 5 — Delivery Verification
  # ────────────────────────────────────────────

  /sessions/{session_id}/checkin:
    post:
      operationId: deliveryCheckin
      x-mcp-tool: delivery.checkin
      summary: Record check-in
      tags: [Delivery]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
            example:
              data:
                type: checkins
                attributes:
                  actor:
                    type: provider
                    id: prov_abc
                  location:
                    lat: -33.4489
                    lng: -70.6693
                  timestamp: "2026-03-16T09:02:00-03:00"
      responses:
        "200":
          description: Check-in recorded, session in `in_progress`.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /sessions/{session_id}/checkout:
    post:
      operationId: deliveryCheckout
      x-mcp-tool: delivery.checkout
      summary: Record check-out
      tags: [Delivery]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
            example:
              data:
                type: checkouts
                attributes:
                  actor:
                    type: provider
                    id: prov_abc
                  location:
                    lat: -33.4489
                    lng: -70.6693
                  timestamp: "2026-03-16T09:47:00-03:00"
      responses:
        "200":
          description: Check-out recorded, session in `completed`.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /sessions/{session_id}/evidence:
    post:
      operationId: deliveryRecordEvidence
      x-mcp-tool: delivery.record_evidence
      summary: Record proof-of-delivery evidence
      tags: [Delivery]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/EvidenceRequest"
            example:
              data:
                type: evidence
                attributes:
                  evidence_type: gps
                  data:
                    lat: -33.4489
                    lng: -70.6693
                    accuracy_meters: 5
                  actor:
                    type: provider
                    id: prov_abc
      responses:
        "201":
          description: Evidence recorded.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ────────────────────────────────────────────
  # Phase 6 — Closing
  # ────────────────────────────────────────────

  /sessions/{session_id}/documentation:
    post:
      operationId: documentationCreate
      x-mcp-tool: documentation.create
      summary: Create service documentation
      tags: [Closing]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/DocumentationRequest"
            example:
              data:
                type: documentation
                attributes:
                  content: "Paciente presenta mejoría en rango de movimiento..."
                  template_id: tmpl_clinical_note
                  actor:
                    type: provider
                    id: prov_abc
      responses:
        "201":
          description: Documentation created, session in `documented`.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SessionResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /sales:
    post:
      operationId: paymentsCreateSale
      x-mcp-tool: payments.create_sale
      summary: Create a sale (charge)
      tags: [Closing]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/SaleCreateRequest"
            example:
              data:
                type: sales
                attributes:
                  client_id: cli_001
                  service_id: svc_001
                  provider_id: prov_abc
                  quantity: 1
                  unit_price: 35000
      responses:
        "201":
          description: Sale created.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/SaleResource"
              example:
                data:
                  type: sales
                  id: sale_001
                  attributes:
                    client_id: cli_001
                    service_id: svc_001
                    provider_id: prov_abc
                    quantity: 1
                    unit_price: 35000
                    total: 35000
                    status: pending
        "422":
          $ref: "#/components/responses/ValidationError"

  /sales/{sale_id}/payments:
    post:
      operationId: paymentsRecordPayment
      x-mcp-tool: payments.record_payment
      summary: Record a payment against a sale
      tags: [Closing]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: sale_id
          in: path
          required: true
          schema:
            type: string
          example: sale_001
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
            example:
              data:
                type: payments
                attributes:
                  amount: 35000
                  method: transferencia
                  reference: TRX-20260316-001
      responses:
        "201":
          description: Payment recorded.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/PaymentResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /payments/status:
    get:
      operationId: paymentsGetStatus
      x-mcp-tool: payments.get_status
      summary: Get payment status (by sale or client)
      tags: [Closing]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: sale_id
          in: query
          schema:
            type: string
          description: Sale ID (provide sale_id OR client_id).
        - name: client_id
          in: query
          schema:
            type: string
          description: Client ID for full account status.
      responses:
        "200":
          description: Payment status or account history.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/PaymentStatusResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ────────────────────────────────────────────
  # Service Orders
  # ────────────────────────────────────────────

  /service-orders:
    get:
      operationId: serviceOrdersList
      x-mcp-tool: service_orders.list
      summary: List service orders
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: organization_id
          in: query
          schema:
            type: string
        - name: client_id
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [draft, proposed, negotiating, active, paused, completed, cancelled]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated service orders.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceOrderCollection"
        "422":
          $ref: "#/components/responses/ValidationError"

    post:
      operationId: serviceOrdersCreate
      x-mcp-tool: service_orders.create
      summary: Create a service order (draft)
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ServiceOrderCreateRequest"
      responses:
        "201":
          description: Service order created in `draft` state.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceOrderResource"
        "422":
          $ref: "#/components/responses/ValidationError"

  /service-orders/{order_id}:
    get:
      operationId: serviceOrdersGet
      x-mcp-tool: service_orders.get
      summary: Get full service order details
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          example: so_abc123
      responses:
        "200":
          description: Service order.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceOrderResource"
        "404":
          $ref: "#/components/responses/NotFound"

  /service-orders/{order_id}/propose:
    post:
      operationId: serviceOrdersPropose
      x-mcp-tool: service_orders.propose
      summary: "Transition: draft → proposed"
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ActorRequest"
            example:
              data:
                type: order_transitions
                attributes:
                  actor:
                    type: organization
                    id: org_xyz
      responses:
        "200":
          description: Order in `proposed` state.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceOrderResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /service-orders/{order_id}/activate:
    post:
      operationId: serviceOrdersActivate
      x-mcp-tool: service_orders.activate
      summary: "Transition: proposed → active"
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ActorRequest"
            example:
              data:
                type: order_transitions
                attributes:
                  actor:
                    type: client
                    id: cli_001
      responses:
        "200":
          description: Order in `active` state.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ServiceOrderResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidTransition"

  /service-orders/{order_id}/ledger:
    get:
      operationId: serviceOrdersGetLedger
      x-mcp-tool: service_orders.get_ledger
      summary: Get real-time computed ledger
      tags: [Service Orders]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ledger with consumption and billing totals.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/LedgerResource"
              example:
                data:
                  type: ledgers
                  id: so_abc123
                  attributes:
                    services_verified: 8
                    hours_consumed: 6.0
                    amount_consumed: 280000
                    amount_billed: 280000
                    amount_collected: 210000
                    amount_remaining: 140000
        "404":
          $ref: "#/components/responses/NotFound"

  # ────────────────────────────────────────────
  # Mandate Management
  # ────────────────────────────────────────────

  /mandates:
    get:
      operationId: mandatesList
      x-mcp-tool: mandates.list
      summary: List mandates
      tags: [Mandates]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, revoked, suspended]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated mandates.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/MandateCollection"
        "403":
          $ref: "#/components/responses/Forbidden"

  /mandates/{mandate_id}:
    get:
      operationId: mandatesGet
      x-mcp-tool: mandates.get
      summary: Get mandate details
      tags: [Mandates]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: mandate_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mandate object.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/MandateResource"
        "404":
          $ref: "#/components/responses/NotFound"

  /mandates/{mandate_id}/suspend:
    post:
      operationId: mandatesSuspend
      x-mcp-tool: mandates.suspend
      summary: Suspend a mandate
      tags: [Mandates]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: mandate_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/SuspendRequest"
            example:
              data:
                type: mandate_actions
                attributes:
                  reason: "Security review in progress."
      responses:
        "200":
          description: Mandate suspended.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/MandateResource"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ────────────────────────────────────────────
  # Resource Management
  # ────────────────────────────────────────────

  /resources:
    get:
      operationId: resourceList
      x-mcp-tool: resource.list
      summary: List physical resources
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: organization_id
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [room, box, chair, equipment]
        - name: is_active
          in: query
          schema:
            type: boolean
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated resources.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ResourceCollection"
        "422":
          $ref: "#/components/responses/ValidationError"

    post:
      operationId: resourceCreate
      x-mcp-tool: resource.create
      summary: Create a physical resource
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ResourceCreateRequest"
            example:
              data:
                type: resources
                attributes:
                  organization_id: org_xyz
                  name: "Box 3"
                  type: box
                  capacity: 1
                  buffer_minutes: 15
                  equipment: [camilla, TENS]
                  location: "Piso 2, ala norte"
                  actor:
                    type: organization
                    id: org_xyz
      responses:
        "201":
          description: Resource created (active by default).
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ResourceResource"
        "422":
          $ref: "#/components/responses/ValidationError"

  /resources/{resource_id}:
    get:
      operationId: resourceGet
      x-mcp-tool: resource.get
      summary: Get resource details with availability blocks
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource with availability blocks.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ResourceResource"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: resourceUpdate
      x-mcp-tool: resource.update
      summary: Partial update (patch semantics)
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ResourceUpdateRequest"
            example:
              data:
                type: resources
                attributes:
                  capacity: 2
                  buffer_minutes: 10
                  actor:
                    type: organization
                    id: org_xyz
      responses:
        "200":
          description: Updated resource.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ResourceResource"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: resourceDelete
      x-mcp-tool: resource.delete
      summary: Soft-delete (deactivate) a resource
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/vnd.api+json:
            schema:
              $ref: "#/components/schemas/ActorRequest"
      responses:
        "200":
          description: Resource deactivated.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/ResourceResource"
        "404":
          $ref: "#/components/responses/NotFound"

  /resources/{resource_id}/availability:
    get:
      operationId: resourceGetAvailability
      x-mcp-tool: resource.get_availability
      summary: Get resource availability for a date range
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/ServicialoVersion"
        - $ref: "#/components/parameters/Accept"
        - $ref: "#/components/parameters/ActorHeader"
        - name: resource_id
          in: path
          required: true
          schema:
            type: string
        - name: date_from
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-16"
        - name: date_to
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-03-22"
        - name: timezone
          in: query
          schema:
            type: string
          example: America/Santiago
      responses:
        "200":
          description: Available time slots.
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/AvailabilityCollection"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── A2A Extension ────────────────────────────

  /.well-known/agents.json:
    get:
      operationId: a2aListAgents
      summary: A2A agent directory
      description: |
        Returns a list of AgentCards for all organizations in this Servicialo node.
        Enables A2A-compatible agents to discover available service providers.
      tags: [A2A Extension]
      security: []
      responses:
        "200":
          description: Agent directory.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentCard"

  /organizations/{org_slug}/.well-known/agent.json:
    get:
      operationId: a2aGetAgentCard
      summary: A2A Agent Card for an organization
      description: |
        Returns the A2A Agent Card describing this organization's capabilities,
        skills, and supported interaction modes. Used by external agents for
        discovery before initiating A2A tasks.
      tags: [A2A Extension]
      security: []
      parameters:
        - name: org_slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug.
      responses:
        "200":
          description: Agent Card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{org_slug}/a2a:
    post:
      operationId: a2aTaskEndpoint
      summary: A2A JSON-RPC task endpoint
      description: |
        JSON-RPC 2.0 endpoint for A2A task operations.
        Supports methods: `tasks/send`, `tasks/get`, `tasks/cancel`.
        The remote agent processes booking requests and returns task status.
      tags: [A2A Extension]
      parameters:
        - name: org_slug
          in: path
          required: true
          schema:
            type: string
          description: Organization slug.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AJsonRpcRequest"
            examples:
              tasksSend:
                summary: Send a booking task
                value:
                  jsonrpc: "2.0"
                  id: "req-1"
                  method: tasks/send
                  params:
                    id: "task-abc-123"
                    message:
                      role: user
                      parts:
                        - type: text
                          text: "Book a kinesiology session for tomorrow at 10am"
      responses:
        "200":
          description: JSON-RPC response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AJsonRpcResponse"
        "404":
          $ref: "#/components/responses/NotFound"

# ════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════

components:

  # ── Security ──────────────────────────────────

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key authentication.

  # ── Parameters ────────────────────────────────

  parameters:
    ServicialoVersion:
      name: X-Servicialo-Version
      in: header
      required: true
      schema:
        type: string
        enum: ["0.8"]
      description: Protocol version.

    Accept:
      name: Accept
      in: header
      required: true
      schema:
        type: string
        enum: ["application/vnd.api+json"]

    ActorHeader:
      name: X-Servicialo-Actor
      in: header
      schema:
        type: string
      description: Base64-encoded JSON Actor object.

    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      example: ses_abc123

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1

    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  # ── Responses ─────────────────────────────────

  responses:
    NotFound:
      description: Resource not found.
      content:
        application/vnd.api+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - status: "404"
                code: NOT_FOUND
                title: Resource not found
                detail: "The requested resource does not exist."

    ValidationError:
      description: Validation error.
      content:
        application/vnd.api+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - status: "422"
                code: VALIDATION_ERROR
                title: Validation failed
                detail: "Missing required field."
                source:
                  pointer: /data/attributes/service_id

    InvalidTransition:
      description: Invalid state transition.
      content:
        application/vnd.api+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - status: "422"
                code: INVALID_TRANSITION
                title: Invalid state transition
                detail: "Cannot transition from 'requested' to 'in_progress'. Valid targets: ['scheduled']."
                source:
                  pointer: /data/attributes/to_state

    Conflict:
      description: Resource conflict.
      content:
        application/vnd.api+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - status: "409"
                code: CONFLICT
                title: Conflict
                detail: "Time slot is no longer available."

    Forbidden:
      description: Insufficient permissions or mandate.
      content:
        application/vnd.api+json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - status: "403"
                code: SCOPE_INSUFFICIENT
                title: Insufficient scope
                detail: "Mandate does not grant 'service:read'."

  # ── Schemas ───────────────────────────────────

  schemas:

    # ── Core types ──

    Actor:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
          enum: [client, provider, organization, agent]
        id:
          type: string
        mandate_id:
          type: string
          description: REQUIRED when type is "agent".
        on_behalf_of:
          type: object
          properties:
            type:
              type: string
            id:
              type: string

    GeoLocation:
      type: object
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180

    Transition:
      type: object
      required: [to, at, by]
      properties:
        from:
          type: ["string", "null"]
        to:
          type: string
        at:
          type: string
          format: date-time
        by:
          type: string
        method:
          type: string
          enum: [auto, manual, agent]
        metadata:
          type: object

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    PaginationLinks:
      type: object
      properties:
        self:
          type: string
        next:
          type: ["string", "null"]
        prev:
          type: ["string", "null"]
        first:
          type: string
        last:
          type: string

    # ── Error ──

    ErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            type: object
            required: [status, code, title]
            properties:
              status:
                type: string
              code:
                type: string
              title:
                type: string
              detail:
                type: string
              source:
                type: object
                properties:
                  pointer:
                    type: string
                  parameter:
                    type: string

    # ── Capabilities ──

    CapabilitiesResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: server
            id:
              type: string
            attributes:
              type: object
              properties:
                protocol_version:
                  type: string
                profile_version:
                  type: string
                compliance:
                  type: string
                  enum: [minimum, extended]
                capabilities:
                  type: array
                  items:
                    type: string

    # ── Resource wrappers (JSON:API) ──

    OrganizationCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationData"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        links:
          $ref: "#/components/schemas/PaginationLinks"

    OrganizationData:
      type: object
      required: [type, id, attributes]
      properties:
        type:
          type: string
          const: organizations
        id:
          type: string
        attributes:
          type: object
          properties:
            name:
              type: string
            vertical:
              type: string
            location:
              type: string
            country:
              type: string

    OrganizationResource:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/OrganizationData"

    ServiceCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ServiceData"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        links:
          $ref: "#/components/schemas/PaginationLinks"

    ServiceData:
      type: object
      required: [type, id, attributes]
      properties:
        type:
          type: string
          const: services
        id:
          type: string
        attributes:
          description: Service object per schema/service.schema.json
          $ref: "../schema/service.schema.json"

    ServiceResource:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ServiceData"

    AvailabilityCollection:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                const: availability_slots
              id:
                type: string
              attributes:
                type: object
                properties:
                  provider_id:
                    type: string
                  starts_at:
                    type: string
                    format: date-time
                  ends_at:
                    type: string
                    format: date-time
                  resource_id:
                    type: string

    ContractResource:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              const: contracts
            id:
              type: string
            attributes:
              type: object
              description: Contract with policies and evidence requirements.
              properties:
                cancellation_policy:
                  type: object
                no_show_policy:
                  type: object
                arbitration_policy:
                  type: object
                required_evidence:
                  type: array
                  items:
                    type: string

    # ── Client ──

    ClientUpsertRequest:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [type, attributes]
          properties:
            type:
              type: string
              const: clients
            attributes:
              type: object
              required: [actor]
              properties:
                email:
                  type: string
                  format: email
                phone:
                  type: string
                name:
                  type: string
                last_name:
                  type: string
                actor:
